# Basic Design Storm (BDS), surge-only driver: deterministic flood hazard using one
# design storm event per return period. 6-hr surge duration (confirmed from time
# series analysis — shorter duration than the 24-hr combined/rain-only storms).
# Rainfall excluded. No stochastic ensemble; no bootstrap uncertainty; no PPCCT.
# This config is referenced as an alternative analysis by norfolk_ssfha_combined.yaml.

fha_id: bds_surgeonly_6hr
fha_approach: bds
project_name: norfolk_ssfha_comparison
study_area_config: cases/norfolk_ssfha_comparison/system.yaml

output_dir: outputs/norfolk_ssfha_comparison/

# --- Return periods ---
return_periods: [1, 2, 10, 100]

# --- Design storm model output ---
# Surge-only zarr: dims (return_pd_yrs:4, x:526, y:513), data var: max_wlevel_m.
# return_pd_yrs = [1, 2, 10, 100]. Surge duration (6-hr) documented here.
design_storm_output: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/model_results/design_storm_tritonswmm_surgeonly.zarr

# --- Design storm time series ---
design_storm_timeseries: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/events/design_storm_surgeonly.nc

# --- Workflow toggles ---
# Note: no toggle_uncertainty — BDS has no ensemble to bootstrap.
toggle_ppcct: false
toggle_flood_risk: true
toggle_design_comparison: false

# --- Execution ---
execution:
  mode: local_concurrent
  max_workers: 4
