# Basic Design Storm (BDS), combined drivers (rain + surge): deterministic flood hazard
# using one design storm event per return period. 24-hr rain duration.
# No stochastic ensemble; no bootstrap uncertainty; no PPCCT.
# This config is referenced as an alternative analysis by norfolk_ssfha_combined.yaml.

fha_id: bds_combined_24hr
fha_approach: bds
project_name: norfolk_ssfha_comparison
study_area_config: cases/norfolk_ssfha_comparison/system.yaml

output_dir: outputs/norfolk_ssfha_comparison/

# --- Return periods ---
return_periods: [1, 2, 10, 100]

# --- Design storm model output ---
# One zarr per BDS config, indexed by return_pd_yrs (not event_iloc).
# Zarr structure: dims (return_pd_yrs:4, x:526, y:513), data var: max_wlevel_m.
# return_pd_yrs = [1, 2, 10, 100]. Same (x:526, y:513) grid as SS zarrs.
# Rain duration (24-hr) was dropped from zarr metadata; documented here.
design_storm_output: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/model_results/design_storm_tritonswmm_combined.zarr

# --- Design storm time series ---
# Characterizes the design storm events (year dim = 4, one per return period).
design_storm_timeseries: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/events/design_storm_combined.nc

# --- Workflow toggles ---
# Note: no toggle_uncertainty — BDS has no ensemble to bootstrap.
toggle_ppcct: false        # PPCCT requires a stochastic ensemble — not applicable to BDS.
toggle_flood_risk: true    # Impact assessment on BDS flood maps is valid.
toggle_design_comparison: false  # Comparison is driven by the primary combined config.

# --- Execution ---
execution:
  mode: local_concurrent
  max_workers: 4
