fha_id: ssfha_combined          # Unique ID. Used as Snakemake wildcard and output
                                 # directory name. Alphanumeric + underscores only.
fha_approach: ssfha              # "ssfha" | "bds"
project_name: norfolk_ssfha_comparison
study_area_config: cases/norfolk_ssfha_comparison/system.yaml

# --- Output directory ---
# Relative to project root (the ss-fha repo root).
output_dir: outputs/norfolk_ssfha_comparison/

# --- Weather record lengths ---
n_years_synthesized: 1000  # Total synthetic years in the weather model run, INCLUDING
                            # years with no simulated events.
                            # The SS time series NetCDF contains only 954 years (those
                            # with ≥1 event); 1000 is the true denominator.
                            # DO NOT infer from len(ds.year) — that gives 954, not 1000.
                            # This is the denominator for ALL simulated return period
                            # calculations. Must be set explicitly.
                            # Source: N_YEARS_SYNTHESIZED = 1000 in legacy __inputs.py
                            # TODO: Confirm against TRITON-SWMM_toolkit weather model
                            #       run metadata before Phase 6 validation.

# --- Return periods ---
return_periods: [1, 2, 10, 100]

# --- TRITON model outputs ---
# "combined" = both rainfall and storm tide drivers active simultaneously.
# Zarr structure: dims (x:526, y:513, event_iloc:3798), data var: max_wlevel_m.
# Scalar metadata coords (ensemble_type, simtype) dropped from zarrs — sim type is
# encoded in filename. Confirmed 2026-02-25.
triton_outputs:
  combined: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/model_results/ss_tritonswmm_combined.zarr
  observed: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/model_results/obs_tritonswmm_combined.zarr
  # observed zarr: dims (x:526, y:513, event_iloc:71) — same grid as SS zarrs; 71 events.
  # Required for toggle_ppcct (Workflow 3).

# --- Monte Carlo Design Storm toggle ---
# MCDS subsets design storms from within this stochastic ensemble (reuses the combined
# zarr above). It is NOT a separate fha_approach — it is a post-processing variant.
# Three formulations: multivariate AND, multivariate OR, univariate.
# Outputs: mcds_return_pd_floods_multivar.nc, ..._multivar_OR.nc, ..._univar.nc
# Only valid when fha_approach: ssfha. Validator raises ConfigurationError
# if toggle_mcds=True on a non-ssfha config.
# Standalone MCDS (independent stochastic event generation) is a shelved future
# improvement — see full_codebase_refactor.md.
toggle_mcds: true

# --- Weather event indices ---
# List of dimension names used to uniquely identify weather events in the time
# series NetCDF and iloc mapping CSV. Must include a year-like index (year/yr/y).
# These replace any hardcoded index names (event_type, year, event_id) throughout
# the codebase — subsetting always uses these user-defined names.
weather_event_indices: [event_type, year, event_id]

# --- Event statistics ---
# Defines which weather driver variables are used when computing univariate and
# multivariate event return periods. Required for the primary (non-comparative)
# ssfha analysis only. Event return periods are computed once and shared with all
# comparative analyses.
event_statistic_variables:
  precip_intensity:
    variable_name: mm_per_hr      # Column name in time series NetCDF.
    units: mm_per_hr              # Currently supported: mm_per_hr.
    max_intensity_windows_min: [5, 15, 30, 60, 120, 240, 360, 720, 1440, 2880]
    # Rolling-window durations (minutes) for max accumulated intensity.
    # Source: RAIN_WINDOWS_MIN in _old_code_to_refactor/__inputs.py.
    # Covers: 5 min (convective peak), 15 min, 30 min, 1 hr, 2 hr, 4 hr,
    #         6 hr, 12 hr, 24 hr (total storm), 48 hr (multi-day).
  boundary_stage:
    variable_name: waterlevel_m   # Column name in time series NetCDF.
    units: m                      # Currently supported: m.
    max_intensity_windows_min: null
    # null → simple maximum over all timesteps (peak storm tide / surge level).
    # A list of window durations can be provided if time-windowed surge statistics
    # are desired (e.g. max 6-hr surge: [360]).

# --- Event data ---
# Per-event meteorological summaries and time series for all SS simulations.
# empirical_rainfall_return_periods and empirical_water_level_return_periods are NOT
# inputs — they are written by the event statistics runner to
# output_dir/event_statistics/ and reloaded from there if already computed.
event_data:
  sim_event_summaries: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/events/ss_simulation_summaries.csv
  # Shape: (3798, ~40). Includes event type, rescaling params, observed event linkages,
  # ~40 rainfall/surge intensity statistics. Note: upstream CSV may label the combined
  # event type as "compound" — this is the upstream coordinate label, not our convention.

  sim_event_timeseries: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/events/ss_simulation_time_series.nc
  # Shape: (event_type=3, year=954, event_id=5, timestep=3261) ~4 GB.
  # Variables: rainfall intensity, water level, surge, tide, + 6 integer-named vars
  # (156, 171, 170, 155, 140, 141 — likely NOAA rain gage station IDs or SWMM node IDs;
  # TODO: confirm meaning before I/O layer (01D) can label them correctly).

  sim_event_iloc_mapping: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/events/ss_event_iloc_mapping.csv
  # Shape: (3798, 4). Cols: event_iloc, year, event_type, event_id.
  # Maps flat event_iloc (zarr dim) to the 3D index used in time series NetCDFs.

  obs_event_summaries: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/events/obs_event_summaries_from_yrs_with_complete_coverage.csv
  # Shape: (71, ~61). Per-event stats for 71 observed events from complete-coverage years.

  obs_event_timeseries: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/events/obs_event_tseries_from_yrs_with_complete_coverage.nc
  # Shape: (year=18, event_type=3, event_id=5, timestep=2174) ~47 MB.
  # Same variables as SS time series plus first_obs_tstep_w_rainfall.

  obs_event_iloc_mapping: /mnt/d/Dropbox/_GradSchool/repos/ss-fha/hydroshare_data/events/obs_event_iloc_mapping.csv
  # Shape: (71, 4). Cols: event_iloc, year, event_type, event_id.

# --- Workflow toggles ---
toggle_uncertainty: true       # Workflow 2: bootstrap flood depth CIs
toggle_ppcct: true             # Workflow 3: PPCCT validation vs. observed

# --- Uncertainty (bootstrap) configuration ---
# Required when toggle_uncertainty: true.
uncertainty:
  n_bootstrap_samples: 500      # Number of bootstrap resamples. 500 provides stable
                                 # 90% CI estimates (consistent with NOAA Atlas 14).
  bootstrap_base_seed: 42       # Base RNG seed. Sample i uses seed (bootstrap_base_seed + i).
                                 # Record this value for run reproducibility.
toggle_flood_risk: true        # Workflow 4: building/road impact assessment
toggle_design_comparison: true # Workflow 5: FHA comparison (requires alt_fha_analyses)

# --- PPCCT configuration ---
# n_years_observed lives here because it is only meaningful in PPCCT context.
ppcct:
  n_years_observed: 18  # Total years of observed record INCLUDING any years with no events.
                         # For Norfolk all 18 observed years have ≥1 event, so
                         # len(obs_ds.year) == 18 here — but other case studies may
                         # have event-free observed years. Always set explicitly.
                         # Denominator for observed return period calculations in PPCCT.
                         # Source: obs_event_tseries_from_yrs_with_complete_coverage.nc
                         #         year dim = 18 (confirmed 2026-02-25).

# --- Execution ---
execution:
  mode: local_concurrent
  max_workers: 4

# --- Alternative FHA analyses for comparison (Workflow 5) ---
# Each file below defines an independent FHA analysis (unique fha_id, fha_approach,
# and model inputs). All analyses run in parallel via the {fha_id} Snakemake wildcard.
# Comparison rules run after all individual analyses complete.
alt_fha_analyses:
  - cases/norfolk_ssfha_comparison/analysis_ssfha_rainonly.yaml
  - cases/norfolk_ssfha_comparison/analysis_ssfha_surgeonly.yaml
  - cases/norfolk_ssfha_comparison/analysis_ssfha_triton_only_combined.yaml
  - cases/norfolk_ssfha_comparison/analysis_bds_combined.yaml
  - cases/norfolk_ssfha_comparison/analysis_bds_rainonly.yaml
  - cases/norfolk_ssfha_comparison/analysis_bds_surgeonly.yaml
